<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription - Gestion des Notes</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: #A8E6CF;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: #fff;
      width: 95%;
      max-width: 520px;
      padding: 35px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.10);
    }

    h2 {
      text-align: center;
      color: #2E7D32;
      margin-bottom: 10px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 25px;
      font-size: 14px;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: 600;
      color: #333;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
      font-size: 15px;
    }

    input:focus, select:focus {
      border-color: #4CAF50;
    }

    .info-box {
      background: #F1F8E9;
      border-left: 4px solid #4CAF50;
      padding: 12px;
      margin-top: 20px;
      border-radius: 8px;
      font-size: 14px;
      color: #444;
    }

    .btn {
      width: 100%;
      margin-top: 25px;
      padding: 14px;
      border: none;
      border-radius: 8px;
      background: #43A047;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #2E7D32;
    }

    .login-link {
      text-align: center;
      margin-top: 18px;
      font-size: 14px;
    }

    .login-link a {
      color: #2E7D32;
      text-decoration: none;
      font-weight: bold;
    }

    .optional {
      font-size: 13px;
      color: #777;
      font-style: italic;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Créer un compte</h2>
  <p class="subtitle">
    Plateforme professionnelle de gestion des notes
  </p>

  <form action="register.php" method="POST">

    <label>Nom complet</label>
    <input type="text" name="nom" placeholder="Votre nom complet" required>

    <label>Sexe</label>
    <select name="sexe" required>
      <option value="">-- Choisir --</option>
      <option value="masculin">Masculin</option>
      <option value="féminin">Féminin</option>
    </select>

    <label>Adresse e-mail</label>
    <input type="email" name="email" placeholder="exemple@email.com" required>

    <label>Mot de passe</label>
    <input type="password" name="password" placeholder="********" required>

    <label>
      Code Formateur
      <span class="optional">(optionnel)</span>
    </label>
    <input 
      type="text" 
      name="code_formateur" 
      placeholder="Seulement si vous êtes formateur">

    <div class="info-box">
      Par défaut, toute inscription crée un compte <strong>Étudiant</strong>.<br><br>
      Si vous possédez un code spécial formateur fourni par l’administration,
      votre compte sera automatiquement enregistré comme <strong>Formateur</strong>.
    </div>

    <button type="submit" class="btn">
      S'inscrire
    </button>

    <div class="login-link">
      Déjà inscrit ?
      <a href="connexion.php">Se connecter</a>
    </div>

  </form>
</div>

</body>
</html>
