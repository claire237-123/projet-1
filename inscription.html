<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inscription avec rôles</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #A8E6CF;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background-color: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      width: 90%;
      max-width: 500px;
    }

    h2 {
      text-align: center;
      color: #4CAF50;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-top: 15px;
      color: #333;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
    }

    .role-options {
      display: flex;
      justify-content: space-between;
      margin-top: 15px;
      gap: 10px;
    }

    .role {
      flex: 1;
      text-align: center;
      border: 2px solid #ccc;
      border-radius: 8px;
      padding: 15px 10px;
      cursor: pointer;
      transition: 0.3s;
      background-color: #f9f9f9;
    }

    .role input {
      display: none;
    }

    .role i {
      font-size: 24px;
      margin-bottom: 8px;
      color: #4CAF50;
    }

    .role span {
      display: block;
      font-weight: bold;
      color: #333;
    }

    .role input:checked + i,
    .role input:checked + i + span {
      color: #4CAF50;
    }

    .role input:checked ~ label {
      border-color:#4CAF50;;
      background-color: #F6FFDE;
    }

    .role.selected {
      border-color: #4CAF50;;
      background-color: #F6FFDE;
    }

    .btn {
      margin-top: 25px;
      width: 100%;
      background-color:#4CAF50;;
      color: #333;
      padding: 12px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .btn:hover {
      background-color: #4CAF50;;
    }

    @media (max-width: 600px) {
      .role-options {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>INSCRIPTION</h2>
        <form id="inscriptionForm" action="register.php" method="POST">
      <label for="nom">Nom complet</label>
      <input type="text" id="nom" name="nom" placeholder="Votre nom complet" required />
       
      <label for="sexe">Sexe</label>
<select id="sexe" name="sexe" required>
  <option value="">-- Choisir --</option>
  <option value="M">Masculin</option>
  <option value="F">Féminin</option>
</select><br>


      <label for="email">Adresse e-mail</label>
      <input type="email" id="email" name="email" placeholder="email@exemple.com" required />

      <label for="password">Mot de passe</label>
      <input type="password" id="password" name="password" placeholder="********" required />

      <label>Choisissez votre rôle :</label>
      <div class="role-options">
        <label class="role">
          <input type="radio" name="role" value="etudiant" required />
          <i class="fas fa-user-graduate"></i>
          <span>Étudiant</span>
        </label>
        <label class="role">
          <input type="radio" name="role" value="formateur" />
          <i class="fas fa-chalkboard-teacher"></i>
          <span>Formateur</span>
        </label>
        <label class="role">
          <input type="radio" name="role" value="administrateur" />
          <i class="fas fa-user-shield"></i>
          <span>Admin</span>
        </label>
      </div>

      <button type="submit" class="btn">S'inscrire</button>
    </form>
  </div>

  <script>
    // Ajout d'une classe "selected" pour le style actif
    document.querySelectorAll('.role input').forEach(input => {
      input.addEventListener('change', () => {
        document.querySelectorAll('.role').forEach(role => role.classList.remove('selected'));
        input.closest('.role').classList.add('selected');
      });
    });
  </script>
</body>
</html>
